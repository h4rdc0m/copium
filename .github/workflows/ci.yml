name: Copium CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build and Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Release]

    steps:
      - uses: actions/checkout@v3

      - name: Cache LLVM
        id: cache-llvm
        uses: actions/cache@v3
        with:
          path: |
            ${{github.workspace}}/build/_deps/llvm-src
            ${{github.workspace}}/build/_deps/llvm-build
          key: ${{ runner.os }}-llvm-20.1.5-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-llvm-20.1.5-

      - name: Install LLVM (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm
          echo "LLVM_DIR=$(brew --prefix)/opt/llvm/lib/cmake/llvm" >> $GITHUB_ENV

      - name: Install LLVM (Windows)
        if: runner.os == 'Windows'
        run: choco install llvm -y

      - name: Set LLVM_DIR (Windows)
        if: runner.os == 'Windows'
        run: echo "LLVM_DIR=C:/Program Files/LLVM/lib/cmake/llvm" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Configure CMake
        run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{matrix.build_type}} -DLLVM_DIR=${{ env.LLVM_DIR }}

      - name: Build
        run: cmake --build ${{github.workspace}}/build --config ${{matrix.build_type}}

      - name: Test
        working-directory: ${{github.workspace}}/build
        run: ctest -C ${{matrix.build_type}}